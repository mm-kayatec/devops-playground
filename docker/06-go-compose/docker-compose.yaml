services:
  postgres:
    image: postgres:17
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresal/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(POSTGRES_USER)"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
